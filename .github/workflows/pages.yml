name: Deploy Mutation Lab to GitHub Pages
# Manual-only: GitHub Pages must first be enabled (Settings → Pages → Source:
# "GitHub Actions"), which on the free plan requires a public repo. Once enabled,
# run this from the Actions tab (or ask Claude to trigger it). Kept off push/PR so
# it never reports a red check before a Pages site exists.
on:
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
